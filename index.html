<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BUSQUEDA DE SUPER HEROES</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <!-- CONTENEDOR PRINCIPAL -->
  <div class="container py-5">

    <!-- TÍTULO -->
    <h1 class="text-center mb-4">BUSQUEDA DE SUPER HEROES</h1>

    <!-- INPUT BUSCADOR -->
    <input 
      id="searchInput"
      type="text"
      class="form-control form-control-lg text-center mb-3"
      placeholder="Buscar héroe (Batman, Darth, Hulk...)">

    <!-- CONTROLES DE PAGINACIÓN -->
    <div class="d-flex justify-content-center gap-2 mb-4 flex-wrap">

      <!-- SELECT CANTIDAD POR PÁGINA -->
      <select id="pageSize" class="form-select w-auto">
        <option value="10">10</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>

      <!-- BOTÓN ANTERIOR -->
      <button id="prevBtn" class="btn btn-outline-info">⬅</button>

      <!-- INFO PÁGINA -->
      <span id="pageInfo" class="align-self-center"></span>

      <!-- BOTÓN SIGUIENTE -->
      <button id="nextBtn" class="btn btn-outline-info">➡</button>
    </div>

    <!-- CONTENEDOR DE HÉROES -->
    <div id="heroesContainer"></div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS PERSONALIZADO -->
  <script src="assets/js/script.js"></script>
</body>
</html>
